<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Law Internship Tracker 2027</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0f1f3d;
      --gold: #c9a84c;
      --gold-light: #e8c96e;
      --bg: #faf8f3;
      --bg2: #f0ece0;
      --card: #ffffff;
      --border: #e8e4d8;
      --text: #1a1a2e;
      --muted: #5a5a7a;
      --green: #2d7a4f;
      --green-bg: #e8f5ee;
      --red: #c0392b;
      --red-bg: #fdecea;
      --orange: #d68a1a;
      --orange-bg: #fff3e0;
      --blue: #1a6fa8;
      --blue-bg: #e3f0fa;
      --purple: #6b3fa0;
      --purple-bg: #f3eeff;
      --sh: 0 2px 8px rgba(15,31,61,0.08), 0 1px 3px rgba(15,31,61,0.05);
      --sh-lg: 0 8px 32px rgba(15,31,61,0.13), 0 2px 8px rgba(15,31,61,0.08);
      --sh-colored-gold: 0 4px 18px rgba(201,168,76,0.18), 0 1px 4px rgba(15,31,61,0.08);
      --sh-colored-blue: 0 4px 18px rgba(26,111,168,0.18), 0 1px 4px rgba(15,31,61,0.06);
      --sh-colored-green: 0 4px 18px rgba(45,122,79,0.18), 0 1px 4px rgba(15,31,61,0.06);
      --sh-colored-orange: 0 4px 18px rgba(214,138,26,0.18), 0 1px 4px rgba(15,31,61,0.06);
      --sh-colored-purple: 0 4px 18px rgba(107,63,160,0.18), 0 1px 4px rgba(15,31,61,0.06);
      --sh-colored-red: 0 4px 18px rgba(192,57,43,0.18), 0 1px 4px rgba(15,31,61,0.06);
      --radius: 12px;
      --transition: 0.15s ease;
    }
    body.dark {
      --bg: #0d1117;
      --bg2: #161b22;
      --card: #1c2333;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --green-bg: #0d2818;
      --red-bg: #2a0d0d;
      --orange-bg: #2a1a00;
      --blue-bg: #0d1f2a;
      --purple-bg: #1a0d2a;
    }
    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background var(--transition), color var(--transition);
    }

    /* ── AUTH PAGE ── */
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--navy) 0%, #1a3260 60%, #0a1628 100%);
      padding: 24px;
    }
    .auth-card {
      background: var(--card);
      border-radius: 18px;
      box-shadow: var(--sh-lg);
      width: 100%;
      max-width: 420px;
      overflow: hidden;
    }
    .auth-card-header {
      background: linear-gradient(135deg, var(--navy) 0%, #1a3260 100%);
      padding: 28px 32px 24px;
      text-align: center;
    }
    .auth-logo {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, var(--gold) 0%, #e8c96e 100%);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      margin: 0 auto 14px;
      box-shadow: 0 4px 12px rgba(201,168,76,0.4);
    }
    .auth-brand { font-size: 22px; font-weight: 800; color: #fff; letter-spacing: -0.3px; text-shadow: 0 2px 8px rgba(0,0,0,0.3); line-height: 1.2; }
    .auth-brand span { color: var(--gold-light); }
    .auth-tagline { font-family: sans-serif; font-size: 11px; color: rgba(255,255,255,0.55); letter-spacing: 1.2px; text-transform: uppercase; margin-top: 4px; }
    .auth-tabs { display: flex; border-bottom: 2px solid var(--border); }
    .auth-tab { flex: 1; padding: 14px; background: none; border: none; font-family: sans-serif; font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; transition: all var(--transition); border-bottom: 2px solid transparent; margin-bottom: -2px; }
    .auth-tab.active { color: var(--navy); border-bottom-color: var(--gold); }
    body.dark .auth-tab.active { color: var(--gold); }
    .auth-body { padding: 28px 32px; }
    .auth-field { margin-bottom: 16px; }
    .auth-label { display: block; font-family: sans-serif; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .auth-input { width: 100%; border: 1.5px solid var(--border); border-radius: 8px; padding: 10px 14px; font-family: sans-serif; font-size: 14px; background: var(--bg); color: var(--text); outline: none; transition: border-color var(--transition); }
    .auth-input:focus { border-color: var(--gold); }
    .auth-btn { width: 100%; padding: 12px; background: linear-gradient(135deg, var(--navy) 0%, #1a3260 100%); color: white; border: none; border-radius: 8px; font-family: sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 8px; transition: opacity var(--transition), transform var(--transition); box-shadow: 0 4px 12px rgba(15,31,61,0.3); }
    .auth-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .auth-error { background: var(--red-bg); color: var(--red); padding: 10px 14px; border-radius: 8px; font-family: sans-serif; font-size: 13px; margin-bottom: 16px; }
    .auth-success { background: var(--green-bg); color: var(--green); padding: 10px 14px; border-radius: 8px; font-family: sans-serif; font-size: 13px; margin-bottom: 16px; }

    /* ── HEADER ── */
    .header { background: linear-gradient(90deg, #0a1628 0%, var(--navy) 40%, #162952 100%); color: #fff; padding: 0 28px; display: flex; align-items: center; justify-content: space-between; height: 62px; box-shadow: 0 2px 16px rgba(10,22,40,0.5), 0 1px 4px rgba(10,22,40,0.3); position: sticky; top: 0; z-index: 100; }
    .header-brand { display: flex; align-items: center; gap: 12px; }
    .header-logo { width: 38px; height: 38px; background: linear-gradient(135deg, var(--gold) 0%, #e8c96e 100%); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 3px 10px rgba(201,168,76,0.45), inset 0 1px 0 rgba(255,255,255,0.2); }
    .header-title { font-size: 19px; font-weight: 800; letter-spacing: -0.4px; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.4), 0 0 20px rgba(201,168,76,0.1); line-height: 1.1; }
    .header-title span { color: var(--gold-light); }
    .header-subtitle { font-family: sans-serif; font-size: 10px; color: rgba(255,255,255,0.45); letter-spacing: 1.2px; text-transform: uppercase; }
    .header-right { display: flex; align-items: center; gap: 6px; }
    .header-user { font-family: sans-serif; font-size: 12px; color: rgba(255,255,255,0.6); margin-right: 6px; }
    .hbtn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: rgba(255,255,255,0.85); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-family: sans-serif; font-size: 12px; font-weight: 500; transition: all var(--transition); }
    .hbtn:hover { background: rgba(255,255,255,0.2); color: #fff; }
    .hbtn.active { background: var(--gold); border-color: var(--gold); color: var(--navy); font-weight: 700; }
    .hbtn.icon { padding: 6px 10px; font-size: 15px; }

    /* ── LAYOUT ── */
    .main { max-width: 1340px; margin: 0 auto; padding: 26px 22px; }

    /* ── STATS BAR ── */
    .stats-bar { display: grid; grid-template-columns: repeat(6,1fr); gap: 12px; margin-bottom: 18px; }
    .stat-card { border-radius: var(--radius); padding: 16px 14px; text-align: center; border-top: 3px solid var(--gold); transition: transform var(--transition), box-shadow var(--transition); position: relative; overflow: hidden; }
    .stat-card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(160deg, var(--card) 60%, var(--bg) 100%); z-index: 0; }
    .stat-card > * { position: relative; z-index: 1; }
    .stat-card { box-shadow: var(--sh-colored-gold); }
    .stat-card:hover { transform: translateY(-2px); }
    .stat-card.blue { border-top-color: var(--blue); box-shadow: var(--sh-colored-blue); }
    .stat-card.orange { border-top-color: var(--orange); box-shadow: var(--sh-colored-orange); }
    .stat-card.purple { border-top-color: var(--purple); box-shadow: var(--sh-colored-purple); }
    .stat-card.green { border-top-color: var(--green); box-shadow: var(--sh-colored-green); }
    .stat-card.red { border-top-color: var(--red); box-shadow: var(--sh-colored-red); }
    .stat-num { font-size: 30px; font-weight: 800; color: var(--navy); line-height: 1; margin-bottom: 4px; }
    body.dark .stat-num { color: #e6edf3; }
    .stat-label { font-family: sans-serif; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; }

    /* ── PROGRESS ── */
    .progress-section { background: var(--card); border-radius: var(--radius); padding: 14px 20px; box-shadow: var(--sh); margin-bottom: 24px; display: flex; align-items: center; gap: 14px; border: 1px solid var(--border); }
    .progress-label { font-family: sans-serif; font-size: 12px; color: var(--muted); white-space: nowrap; min-width: 130px; font-weight: 600; }
    .progress-track { flex: 1; height: 9px; background: var(--bg2); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold) 0%, var(--green) 100%); border-radius: 99px; transition: width 0.5s ease; }
    .progress-pct { font-family: sans-serif; font-size: 13px; font-weight: 800; color: var(--navy); min-width: 38px; text-align: right; }
    body.dark .progress-pct { color: #e6edf3; }
    .progress-detail { font-family: sans-serif; font-size: 11px; color: var(--muted); }

    /* ── SECTION HEADER ── */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 10px; }
    .section-title { font-size: 19px; color: var(--navy); font-weight: 700; }
    body.dark .section-title { color: #e6edf3; }
    .filter-bar { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 14px; }
    .filter-chip { background: none; border: 1.5px solid var(--border); padding: 5px 13px; border-radius: 99px; font-family: sans-serif; font-size: 12px; cursor: pointer; color: var(--muted); transition: all var(--transition); }
    .filter-chip:hover { border-color: var(--gold); color: var(--text); }
    .filter-chip.active { background: var(--navy); border-color: var(--navy); color: #fff; }
    body.dark .filter-chip.active { background: var(--gold); border-color: var(--gold); color: var(--navy); }
    .search-input { border: 1.5px solid var(--border); border-radius: 8px; padding: 7px 13px; font-family: sans-serif; font-size: 13px; outline: none; background: var(--card); color: var(--text); transition: border-color var(--transition); width: 210px; }
    .search-input:focus { border-color: var(--gold); }

    /* ── TRACKER TABLE ── */
    .tracker-table { background: var(--card); border-radius: 14px; box-shadow: var(--sh); overflow: hidden; border: 1px solid var(--border); }
    .tracker-table table { width: 100%; border-collapse: collapse; }
    .tracker-table thead { background: linear-gradient(90deg, var(--navy) 0%, #1a3260 100%); }
    .tracker-table th { padding: 11px 14px; text-align: left; font-family: sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: rgba(255,255,255,0.85); white-space: nowrap; cursor: pointer; user-select: none; }
    .tracker-table th:hover { color: #fff; }
    .tracker-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); font-family: sans-serif; font-size: 12px; vertical-align: middle; }
    .tracker-table tr:last-child td { border-bottom: none; }
    .tracker-table tbody tr:hover { background: var(--bg); }
    .tracker-table tbody tr.completed { opacity: 0.45; }
    .tracker-table tbody tr.completed td:not(.no-strike) { text-decoration: line-through; }
    .firm-name { font-weight: 700; color: var(--navy); font-size: 12px; cursor: pointer; transition: color var(--transition); }
    body.dark .firm-name { color: #8ab4f8; }
    .firm-name:hover { color: var(--blue); }
    .firm-type { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 9px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
    .firm-type.magic { background: #fff0cc; color: #7a5500; }
    .firm-type.silver { background: #e8eaf6; color: #3949ab; }
    .firm-type.us { background: #fce4ec; color: #c62828; }
    .firm-type.intl { background: #e8f5e9; color: #2e7d32; }
    .firm-type.regional { background: #e3f2fd; color: #1565c0; }
    body.dark .firm-type.magic { background: #3a2800; color: #e8c96e; }
    body.dark .firm-type.silver { background: #1a1f4a; color: #9fa8da; }
    body.dark .firm-type.us { background: #3a1010; color: #ef9a9a; }
    body.dark .firm-type.intl { background: #0d2818; color: #81c784; }
    body.dark .firm-type.regional { background: #0d1f3a; color: #64b5f6; }
    .date-cell { color: var(--muted); white-space: nowrap; font-size: 11px; }
    .date-cell.urgent { color: var(--red); font-weight: 700; }
    .date-cell.soon { color: var(--orange); font-weight: 600; }
    .stage-select { border: 1.5px solid var(--border); border-radius: 6px; padding: 4px 9px; font-family: sans-serif; font-size: 11px; cursor: pointer; background: var(--bg); color: var(--text); outline: none; min-width: 148px; transition: border-color var(--transition); }
    .stage-select:focus { border-color: var(--gold); }
    .stage-select.s-researching { background: var(--blue-bg); color: var(--blue); }
    .stage-select.s-applied { background: var(--orange-bg); color: var(--orange); }
    .stage-select.s-online-test { background: var(--purple-bg); color: var(--purple); }
    .stage-select.s-first-interview { background: var(--blue-bg); color: #0d47a1; }
    .stage-select.s-second-interview { background: var(--green-bg); color: var(--green); }
    .stage-select.s-ac { background: #fce4ec; color: #880e4f; }
    body.dark .stage-select.s-ac { background: #3a0d1f; color: #f48fb1; }
    .stage-select.s-offer { background: var(--green-bg); color: var(--green); font-weight: 700; }
    .stage-select.s-rejected { background: var(--red-bg); color: var(--red); }
    .stage-select.s-withdrawn { background: var(--bg2); color: var(--muted); }
    .icon-btn { background: none; border: 1.5px solid var(--border); border-radius: 6px; padding: 4px 9px; cursor: pointer; font-size: 14px; transition: all var(--transition); color: var(--muted); line-height: 1; }
    .icon-btn:hover { border-color: var(--gold); background: var(--bg); }
    .icon-btn.done { border-color: var(--green); background: var(--green-bg); color: var(--green); }
    .icon-btn.has-files { border-color: var(--blue); color: var(--blue); }
    .notes-input { border: 1.5px solid var(--border); border-radius: 6px; padding: 4px 8px; font-family: sans-serif; font-size: 11px; background: var(--bg); color: var(--text); outline: none; width: 130px; transition: border-color var(--transition); }
    .notes-input:focus { border-color: var(--gold); }
    .first-year-badge { margin-left: 5px; font-size: 9px; background: var(--green-bg); color: var(--green); padding: 1px 5px; border-radius: 3px; font-family: sans-serif; font-weight: 700; vertical-align: middle; }

    /* ── CALENDAR ── */
    .calendar-wrapper { background: var(--card); border-radius: 14px; box-shadow: var(--sh); overflow: hidden; border: 1px solid var(--border); }
    .calendar-header { background: linear-gradient(90deg, var(--navy) 0%, #1a3260 100%); color: #fff; padding: 14px 22px; display: flex; align-items: center; justify-content: space-between; }
    .cal-nav-btn { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.15); color: white; width: 30px; height: 30px; border-radius: 6px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: background var(--transition); }
    .cal-nav-btn:hover { background: rgba(255,255,255,0.25); }
    .cal-month-title { font-size: 17px; font-weight: 700; }
    .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); }
    .cal-dow { padding: 9px 4px; text-align: center; font-family: sans-serif; font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; border-bottom: 2px solid var(--border); background: var(--bg); }
    .cal-cell { min-height: 88px; padding: 5px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .cal-cell:nth-child(7n) { border-right: none; }
    .cal-cell.other-month { background: var(--bg); }
    .cal-cell.today { background: #fffbe6; }
    body.dark .cal-cell.today { background: #2a2000; }
    .cal-day-num { font-family: sans-serif; font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 3px; }
    .cal-cell.today .cal-day-num { background: var(--gold); color: var(--navy); width: 21px; height: 21px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .cal-event { font-family: sans-serif; font-size: 9px; padding: 2px 4px; border-radius: 3px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cal-event.opens { background: var(--blue-bg); color: #0d47a1; border-left: 2px solid #0d47a1; }
    .cal-event.closes { background: var(--red-bg); color: var(--red); border-left: 2px solid var(--red); }
    .cal-event.done-event { opacity: 0.35; text-decoration: line-through; }
    body.dark .cal-event.opens { background: #0d1f3a; color: #64b5f6; border-left-color: #64b5f6; }
    body.dark .cal-event.closes { background: #3a1010; color: #ef9a9a; border-left-color: #ef9a9a; }

    /* ── TIMELINE ── */
    .timeline-container { background: var(--card); border-radius: 14px; box-shadow: var(--sh); padding: 22px; border: 1px solid var(--border); }
    .timeline-item { display: flex; gap: 14px; }
    .timeline-left { display: flex; flex-direction: column; align-items: center; min-width: 36px; }
    .timeline-dot { width: 13px; height: 13px; border-radius: 50%; background: var(--gold); border: 3px solid var(--card); box-shadow: 0 0 0 2px var(--gold); flex-shrink: 0; z-index: 1; }
    .timeline-dot.closes { background: var(--red); box-shadow: 0 0 0 2px var(--red); }
    .timeline-line { width: 2px; flex: 1; background: var(--border); margin: 3px 0; }
    .timeline-content { padding-bottom: 18px; flex: 1; }
    .timeline-date { font-family: sans-serif; font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
    .timeline-card { background: var(--bg); border-radius: 8px; padding: 9px 13px; border-left: 3px solid var(--gold); border: 1px solid var(--border); border-left-width: 3px; }
    .timeline-card.closes { border-left-color: var(--red); }
    .timeline-firm { font-weight: 700; font-size: 12px; color: var(--navy); }
    body.dark .timeline-firm { color: #e6edf3; }
    .timeline-detail { font-family: sans-serif; font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* ── MODAL ── */
    .overlay { position: fixed; inset: 0; background: rgba(10,18,35,0.6); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 16px; backdrop-filter: blur(2px); }
    .modal { background: var(--card); border-radius: 16px; padding: 0; max-width: 560px; width: 100%; box-shadow: var(--sh-lg); max-height: 90vh; overflow-y: auto; border: 1px solid var(--border); }
    .modal-head { padding: 22px 26px 0; display: flex; align-items: flex-start; justify-content: space-between; }
    .modal-title { font-size: 19px; font-weight: 800; color: var(--navy); }
    body.dark .modal-title { color: #e6edf3; }
    .modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--muted); padding: 0 4px; line-height: 1; }
    .modal-close:hover { color: var(--text); }
    .modal-body { padding: 18px 26px 26px; }
    .modal-row { display: flex; gap: 8px; align-items: baseline; margin-bottom: 9px; }
    .modal-key { font-family: sans-serif; font-size: 11px; color: var(--muted); min-width: 90px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
    .modal-val { font-family: sans-serif; font-size: 13px; color: var(--text); font-weight: 500; }
    .modal-desc { font-family: sans-serif; font-size: 12px; color: var(--muted); line-height: 1.6; margin: 10px 0 18px; padding: 10px 14px; background: var(--bg); border-radius: 8px; border: 1px solid var(--border); }
    .modal-section { margin-top: 18px; padding-top: 18px; border-top: 1px solid var(--border); }
    .modal-section-title { font-family: sans-serif; font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px; }
    .notes-area { width: 100%; border: 1.5px solid var(--border); border-radius: 8px; padding: 10px 13px; font-family: sans-serif; font-size: 13px; background: var(--bg); color: var(--text); outline: none; resize: vertical; min-height: 90px; transition: border-color var(--transition); }
    .notes-area:focus { border-color: var(--gold); }
    .upload-zone { border: 2px dashed var(--border); border-radius: 10px; padding: 22px; text-align: center; cursor: pointer; transition: all var(--transition); position: relative; margin-bottom: 12px; }
    .upload-zone:hover { border-color: var(--gold); background: var(--bg); }

const SHORT_MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

/* ═══════════════════════════════════════════════
   SUPABASE DATA FUNCTIONS
═══════════════════════════════════════════════ */
function baseState() {
  const s = {};
  FIRMS.forEach(f => { s[f.id] = { stage: 'not-started', completed: false, notes: '' }; });
  return s;
}

async function loadStates(userId) {
  const { data, error } = await sb.from('firm_states').select('firm_id,stage,completed,notes').eq('user_id', userId);
  if (error) throw error;
  const state = baseState();
  (data || []).forEach(row => {
    state[row.firm_id] = { stage: row.stage, completed: row.completed, notes: row.notes || '' };
  });
  return state;
}

async function upsertState(userId, firmId, patch) {
  const { error } = await sb.from('firm_states').upsert(
    { user_id: userId, firm_id: firmId, stage: patch.stage, completed: patch.completed, notes: patch.notes, updated_at: new Date().toISOString() },
    { onConflict: 'user_id,firm_id' }
  );
  if (error) console.error('upsert error:', error);
}

async function loadFiles(userId, firmId) {
  const { data } = await sb.from('firm_files').select('id,name,file_type,size,storage_path,uploaded_at').eq('user_id', userId).eq('firm_id', firmId).order('uploaded_at');
  return data || [];
}

async function loadFileCounts(userId) {
  const { data } = await sb.from('firm_files').select('firm_id').eq('user_id', userId);
  const counts = {};
  (data || []).forEach(row => { counts[row.firm_id] = (counts[row.firm_id] || 0) + 1; });
  return counts;
}

async function uploadFile(userId, firmId, file) {
  const ext = file.name.split('.').pop();
  const path = `${userId}/${firmId}/${Date.now()}.${ext}`;
  const { error: upErr } = await sb.storage.from('firm-files').upload(path, file);
  if (upErr) throw upErr;
  const { data, error } = await sb.from('firm_files').insert({
    user_id: userId, firm_id: firmId, name: file.name,
    file_type: file.type, size: file.size, storage_path: path,
    uploaded_at: new Date().toISOString().slice(0, 10)
  }).select('id,name,file_type,size,storage_path,uploaded_at').single();
  if (error) throw error;
  return data;
}

async function downloadFile(storagePath, name) {
  const { data, error } = await sb.storage.from('firm-files').download(storagePath);
  if (error) throw error;
  const url = URL.createObjectURL(data);
  const a = document.createElement('a');
  a.href = url; a.download = name; a.click();
  URL.revokeObjectURL(url);
}

async function removeFile(fileId, storagePath) {
  await sb.storage.from('firm-files').remove([storagePath]);
  await sb.from('firm_files').delete().eq('id', fileId);
}

/* ═══════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════ */
const getDark    = () => localStorage.getItem('lt_dark') === '1';
const parseDate  = s => new Date(s + 'T00:00:00');
const formatDate = s => { const d = parseDate(s); return `${d.getDate()} ${SHORT_MONTHS[d.getMonth()]} ${d.getFullYear()}`; };
function daysUntil(s) {
  const t = new Date(); t.setHours(0,0,0,0);
  const d = parseDate(s); d.setHours(0,0,0,0);
  return Math.round((d - t) / 86400000);
}
function urgClass(s) { const d = daysUntil(s); if (d < 0) return ''; if (d <= 14) return 'urgent'; if (d <= 30) return 'soon'; return ''; }
const stageObj = v => STAGES.find(s => s.v === v) || STAGES[0];
function fmtBytes(n) { if (n < 1024) return n + 'B'; if (n < 1048576) return (n/1024).toFixed(0) + 'KB'; return (n/1048576).toFixed(1) + 'MB'; }
function fileIcon(type) {
  if (type.includes('pdf')) return '📄';
  if (type.includes('word') || type.includes('document')) return '📝';
  if (type.includes('image')) return '🖼️';
  if (type.includes('text')) return '📃';
  return '📎';
}

/* ═══════════════════════════════════════════════
   AUTH PAGE
═══════════════════════════════════════════════ */
function AuthPage() {
  const [tab, setTab]       = useState('login');
  const [name, setName]     = useState('');
  const [email, setEmail]   = useState('');
  const [pwd, setPwd]       = useState('');
  const [pwd2, setPwd2]     = useState('');
  const [err, setErr]       = useState('');
  const [msg, setMsg]       = useState('');
  const [loading, setLoading] = useState(false);

  function reset() { setErr(''); setMsg(''); }

  async function login(e) {
    e.preventDefault(); reset(); setLoading(true);
    try {
      const { error } = await sb.auth.signInWithPassword({ email: email.trim(), password: pwd });
      if (error) setErr(error.message);
    } catch { setErr('Something went wrong. Please try again.'); }
    finally { setLoading(false); }
  }

  async function register(e) {
    e.preventDefault(); reset(); setLoading(true);
    try {
      if (!name.trim()) { setErr('Please enter your name.'); return; }
      if (pwd.length < 6) { setErr('Password must be at least 6 characters.'); return; }
      if (pwd !== pwd2) { setErr('Passwords do not match.'); return; }
      const { data, error } = await sb.auth.signUp({
        email: email.trim(), password: pwd,
        options: { data: { name: name.trim() } }
      });
      if (error) { setErr(error.message); return; }
      if (!data.session) setMsg('Account created! Check your email to confirm before signing in.');
    } catch { setErr('Something went wrong. Please try again.'); }
    finally { setLoading(false); }
  }

  return (
    <div className="auth-page">
      <div className="auth-card">
        <div className="auth-card-header">
          <div className="auth-logo">⚖</div>
          <div className="auth-brand"><span>Law</span> Internship Tracker</div>
          <div className="auth-tagline">Summer 2027 · First Year Guide</div>
        </div>
        <div className="auth-tabs">
          <button className={`auth-tab ${tab==='login'?'active':''}`} onClick={()=>{setTab('login');reset();}}>Sign In</button>
          <button className={`auth-tab ${tab==='register'?'active':''}`} onClick={()=>{setTab('register');reset();}}>Create Account</button>
        </div>
        <div className="auth-body">
          {err && <div className="auth-error">{err}</div>}
          {msg && <div className="auth-success">{msg}</div>}
          {tab === 'login' ? (
            <form onSubmit={login}>
              <div className="auth-field">
                <label className="auth-label">Email</label>
                <input className="auth-input" type="email" required autoFocus value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@university.ac.uk" />
              </div>
              <div className="auth-field">
                <label className="auth-label">Password</label>
                <input className="auth-input" type="password" required value={pwd} onChange={e=>setPwd(e.target.value)} placeholder="••••••••" />
              </div>
              <button className="auth-btn" type="submit" disabled={loading}>{loading ? 'Signing in…' : 'Sign In'}</button>
            </form>
          ) : (
            <form onSubmit={register}>
              <div className="auth-field">
                <label className="auth-label">Full Name</label>
                <input className="auth-input" type="text" required autoFocus value={name} onChange={e=>setName(e.target.value)} placeholder="Your name" />
              </div>
              <div className="auth-field">
                <label className="auth-label">Email</label>
                <input className="auth-input" type="email" required value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@university.ac.uk" />
              </div>
              <div className="auth-field">
                <label className="auth-label">Password</label>
                <input className="auth-input" type="password" required value={pwd} onChange={e=>setPwd(e.target.value)} placeholder="Min 6 characters" />
              </div>
              <div className="auth-field">
                <label className="auth-label">Confirm Password</label>
                <input className="auth-input" type="password" required value={pwd2} onChange={e=>setPwd2(e.target.value)} placeholder="Repeat password" />
              </div>
              <button className="auth-btn" type="submit" disabled={loading}>{loading ? 'Creating account…' : 'Create Account'}</button>
            </form>
          )}
        </div>
      </div>
    </div>
  );
}

═══════════════════════════════════════════════ */
function SettingsModal({ user, dark, onDark, onClose }) {
  const [changePwd, setChangePwd] = useState(false);
  const [oldPwd, setOldPwd]       = useState('');
  const [newPwd, setNewPwd]       = useState('');
  const [newPwd2, setNewPwd2]     = useState('');
  const [pwdMsg, setPwdMsg]       = useState('');
  const userName = user.user_metadata?.name || user.email;

  async function handleChangePwd(e) {
    e.preventDefault(); setPwdMsg('');
    try {
      const { error: authErr } = await sb.auth.signInWithPassword({ email: user.email, password: oldPwd });
      if (authErr) { setPwdMsg('Current password is incorrect.'); return; }
      if (newPwd.length < 6) { setPwdMsg('New password must be at least 6 characters.'); return; }
      if (newPwd !== newPwd2) { setPwdMsg('New passwords do not match.'); return; }
      const { error } = await sb.auth.updateUser({ password: newPwd });
      if (error) { setPwdMsg(error.message); return; }
      setPwdMsg('✓ Password updated successfully.');
      setOldPwd(''); setNewPwd(''); setNewPwd2('');
    } catch { setPwdMsg('Something went wrong.'); }
  }

  async function handleLogout() {
    await sb.auth.signOut();
    onClose();
  }

  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal settings-modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <div className="modal-title">Settings</div>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          <div className="settings-section">
            <div className="settings-label">Account</div>
            <div className="info-row"><span className="info-row-key">Name</span><span className="info-row-val">{userName}</span></div>
            <div className="info-row"><span className="info-row-key">Email</span><span className="info-row-val">{user.email}</span></div>
          </div>
          <div className="settings-section">
            <div className="settings-label">Appearance</div>
            <div className="toggle-row">
              <span className="toggle-text">🌙 Dark Mode</span>
              <label className="toggle-switch" onClick={()=>onDark(!dark)}>
                <div className={`toggle-track ${dark?'on':''}`}><div className={`toggle-thumb ${dark?'on':''}`} /></div>
              </label>
            </div>
          </div>
          <div className="settings-section">
            <div className="settings-label">Change Password</div>
            {!changePwd ? (
              <button className="filter-chip" style={{border:'1.5px solid var(--border)'}} onClick={()=>setChangePwd(true)}>Change password…</button>
            ) : (
              <form onSubmit={handleChangePwd} style={{display:'flex',flexDirection:'column',gap:8}}>
                {pwdMsg && <div style={{fontFamily:'sans-serif',fontSize:12,color:pwdMsg.startsWith('✓')?'var(--green)':'var(--red)',padding:'6px 10px',background:'var(--bg)',borderRadius:6}}>{pwdMsg}</div>}
                <input className="auth-input" type="password" placeholder="Current password" value={oldPwd} onChange={e=>setOldPwd(e.target.value)} required />
                <input className="auth-input" type="password" placeholder="New password" value={newPwd} onChange={e=>setNewPwd(e.target.value)} required />
                <input className="auth-input" type="password" placeholder="Confirm new password" value={newPwd2} onChange={e=>setNewPwd2(e.target.value)} required />
                <button className="auth-btn" type="submit">Update Password</button>
              </form>
            )}
          </div>
          <div className="settings-section">
            <div className="settings-label">Account Actions</div>
            <button className="danger-btn" onClick={handleLogout}>Sign Out</button>
          </div>
        </div>
      </div>
    </div>
  );
}

  const [uploading, setUploading] = useState(false);
  const notesTimer = useRef();

  useEffect(() => {
    loadFiles(userId, firm.id).then(f => { setFiles(f); setFilesLoading(false); });
  }, []);

  function handleNotesChange(val) {
    setNotes(val);
    clearTimeout(notesTimer.current);
    notesTimer.current = setTimeout(() => onStateChange(firm.id, 'notes', val), 800);
  }

  async function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 50 * 1024 * 1024) { setUploadErr('File too large. Maximum is 50MB.'); return; }
    setUploadErr(''); setUploading(true);
    try {
      const entry = await uploadFile(userId, firm.id, file);
      setFiles(prev => [...prev, entry]);
      onFilesChanged();
    } catch(err) {
      setUploadErr('Upload failed: ' + (err.message || 'unknown error'));
    } finally {
      setUploading(false);
      e.target.value = '';
    }
  }

  async function handleDelete(fileId, storagePath) {
    try {
      await removeFile(fileId, storagePath);
      setFiles(prev => prev.filter(f => f.id !== fileId));
      onFilesChanged();
    } catch(err) { console.error('Delete failed:', err); }
  }

  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:580}}>
        <div className="modal-head">
          <div>
            <div className="modal-title">{firm.name}</div>
            <span className={`firm-type ${firm.type}`} style={{fontSize:10,marginTop:4,display:'inline-block'}}>{firm.tl}</span>
            {firm.fy && <span className="first-year-badge">1Y</span>}
          </div>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          <div className="modal-row"><span className="modal-key">Programme</span><span className="modal-val">{firm.prog}</span></div>
          <div className="modal-row"><span className="modal-key">Opens</span><span className="modal-val">{formatDate(firm.opens)}</span></div>
          <div className="modal-row"><span className="modal-key">Deadline</span><span className="modal-val" style={{color:daysUntil(firm.closes)<0?'var(--muted)':daysUntil(firm.closes)<=14?'var(--red)':'var(--text)'}}>{formatDate(firm.closes)}{daysUntil(firm.closes)>0&&` (${daysUntil(firm.closes)} days)`}{daysUntil(firm.closes)<0&&' — Closed'}</span></div>
          <div className="modal-row"><span className="modal-key">Duration</span><span className="modal-val">{firm.dur}</span></div>
          <div className="modal-row"><span className="modal-key">Stipend</span><span className="modal-val">{firm.pay}</span></div>
          <div className="modal-row"><span className="modal-key">Location</span><span className="modal-val">{firm.loc}</span></div>
          <div className="modal-desc">{firm.desc}</div>
          {firm.fy && <div className="first-year-tag">✓ Open to First-Year Students</div>}
          <div style={{marginTop:12}}><a className="modal-link" href={firm.url} target="_blank" rel="noopener">Visit application page →</a></div>

          <div className="modal-section">
            <div className="modal-section-title">Notes & Interview Prep</div>
            <textarea className="notes-area" value={notes} onChange={e=>handleNotesChange(e.target.value)} placeholder="Add research notes, interview prep, key contacts, or anything else about this firm…" />
          </div>

          <div className="modal-section">
            <div className="modal-section-title">Files ({filesLoading ? '…' : files.length})</div>
            <div className="upload-zone">
              <input type="file" onChange={handleFile} disabled={uploading} />
              <div className="upload-icon">{uploading ? '⏳' : '📎'}</div>
              <div className="upload-text"><strong>{uploading ? 'Uploading…' : 'Click to upload'}</strong>{!uploading && ' or drag and drop'}</div>
              <div className="upload-text" style={{marginTop:3}}>PDF, Word, TXT, Images — max 50MB</div>
            </div>
            {uploadErr && <div className="upload-warning">⚠️ {uploadErr}</div>}
            {files.length > 0 && (
              <div className="file-list">
                {files.map(f => (
                  <div key={f.id} className="file-item">
                    <div className="file-icon">{fileIcon(f.file_type || '')}</div>
                    <div className="file-info">
                      <div className="file-name">{f.name}</div>
                      <div className="file-meta">{fmtBytes(f.size)} · {f.uploaded_at}</div>
                    </div>
                    <div className="file-actions">
                      <button className="file-btn" onClick={()=>downloadFile(f.storage_path, f.name)}>Download</button>
                      <button className="file-btn del" onClick={()=>handleDelete(f.id, f.storage_path)}>Delete</button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   STAT BAR
═══════════════════════════════════════════════ */
function StatBar({ appState }) {
  const total     = FIRMS.length;
  const applied   = Object.values(appState).filter(s => ['applied','online-test','first-interview','second-interview','ac','offer'].includes(s.stage)).length;
  const interviews= Object.values(appState).filter(s => ['first-interview','second-interview','ac'].includes(s.stage)).length;
  const acs       = Object.values(appState).filter(s => s.stage === 'ac').length;
  const offers    = Object.values(appState).filter(s => s.stage === 'offer').length;
  const rejected  = Object.values(appState).filter(s => s.stage === 'rejected').length;
  const pct = total > 0 ? Math.round(applied / total * 100) : 0;
  return (
    <>
      <div className="stats-bar">
        {[[total,'Total Firms',''],[applied,'Applied','blue'],[interviews,'Interviews','orange'],[acs,'Assess. Centres','purple'],[offers,'Offers','green'],[rejected,'Rejected','red']].map(([n,l,c]) => (
          <div key={l} className={`stat-card ${c}`}>
            <div className="stat-num">{n}</div>
            <div className="stat-label">{l}</div>
          </div>
        ))}
      </div>
      <div className="progress-section">
        <div className="progress-label">Application progress</div>
        <div className="progress-track"><div className="progress-fill" style={{width:pct+'%'}} /></div>
        <div className="progress-pct">{pct}%</div>
        <div className="progress-detail">{applied} of {total} applied</div>
      </div>
    </>
  );
}

/* ═══════════════════════════════════════════════
   TRACKER VIEW
═══════════════════════════════════════════════ */
function TrackerView({ appState, setAppState, userId }) {
  const [filter, setFilter]     = useState('all');
  const [search, setSearch]     = useState('');
  const [sortCol, setSortCol]   = useState('closes');
  const [sortDir, setSortDir]   = useState(1);
  const [modal, setModal]       = useState(null);
  const [fileCounts, setFileCounts] = useState({});
  const saveTimers = useRef({});

  useEffect(() => {
    loadFileCounts(userId).then(setFileCounts);
  }, [userId]);

  const FILTERS = [
    {k:'all',l:'All Firms'}, {k:'first-year',l:'1st Year Only'},
    {k:'magic',l:'Magic Circle'}, {k:'silver',l:'Silver Circle'},
    {k:'us',l:'US Firms'}, {k:'intl',l:'International'}, {k:'regional',l:'UK Regional'},
  ];

  const filtered = useMemo(() => {
    let list = [...FIRMS];
    if (filter === 'first-year') list = list.filter(f => f.fy);
    else if (filter !== 'all') list = list.filter(f => f.type === filter);
    if (search.trim()) { const q = search.toLowerCase(); list = list.filter(f => f.name.toLowerCase().includes(q) || f.prog.toLowerCase().includes(q) || f.loc.toLowerCase().includes(q)); }
    list.sort((a, b) => {
      let va, vb;
      if (sortCol==='closes'){va=a.closes;vb=b.closes;}
      else if (sortCol==='opens'){va=a.opens;vb=b.opens;}
      else if (sortCol==='name'){va=a.name;vb=b.name;}
      else if (sortCol==='stage'){va=stageObj(appState[a.id]?.stage||'not-started').l;vb=stageObj(appState[b.id]?.stage||'not-started').l;}
      else {va=a[sortCol]||'';vb=b[sortCol]||'';}
      return va < vb ? -sortDir : va > vb ? sortDir : 0;
    });
    return list;
  }, [filter, search, appState, sortCol, sortDir]);

  function update(id, field, val) {
    setAppState(prev => {
      const next = { ...prev, [id]: { ...prev[id], [field]: val } };
      if (field === 'notes') {
        clearTimeout(saveTimers.current[id]);
        saveTimers.current[id] = setTimeout(() => upsertState(userId, id, next[id]), 800);
      } else {
        upsertState(userId, id, next[id]);
      }
      return next;
    });
  }

  function handleFilesChanged() {
    loadFileCounts(userId).then(setFileCounts);
  }

  function th(col, label) {
    const active = sortCol === col;
    return <th onClick={()=>{if(active)setSortDir(d=>-d);else{setSortCol(col);setSortDir(1);}}}>{label}{active?(sortDir===1?' ↑':' ↓'):''}</th>;
  }

  return (
    <div>
      {modal && <FirmModal firm={modal} userId={userId} appState={appState} onStateChange={update} onClose={()=>setModal(null)} onFilesChanged={handleFilesChanged} />}
      <div className="section-header">
        <div className="section-title">Application Tracker <span style={{fontSize:13,color:'var(--muted)',fontFamily:'sans-serif',fontWeight:400,marginLeft:8}}>{filtered.length} firms</span></div>
        <input className="search-input" placeholder="Search firms, locations…" value={search} onChange={e=>setSearch(e.target.value)} />
      </div>
      <div className="filter-bar">
        {FILTERS.map(f => <button key={f.k} className={`filter-chip ${filter===f.k?'active':''}`} onClick={()=>setFilter(f.k)}>{f.l}</button>)}
      </div>
      <div className="tracker-table">
        <table>
          <thead><tr>
            {th('name','Firm')}
            <th>Type</th>
            <th>Programme</th>
            {th('opens','Opens')}
            {th('closes','Deadline')}
            <th>Pay</th>
            {th('stage','Stage')}
            <th>Quick Note</th>
            <th>Files</th>
            <th>Done</th>
          </tr></thead>
          <tbody>
            {filtered.map(firm => {
              const st = appState[firm.id] || { stage:'not-started', completed:false, notes:'' };
              const so = stageObj(st.stage);
              const fc = fileCounts[firm.id] || 0;
              return (
                <tr key={firm.id} className={st.completed ? 'completed' : ''}>
                  <td>
                    <span className="firm-name" onClick={()=>setModal(firm)}>{firm.name}</span>
                    {firm.fy && <span className="first-year-badge">1Y</span>}
                  </td>
                  <td><span className={`firm-type ${firm.type}`}>{firm.tl}</span></td>
                  <td style={{maxWidth:150,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',fontSize:11}}>{firm.prog}</td>
                  <td className={`date-cell ${urgClass(firm.opens)}`}>{formatDate(firm.opens)}</td>
                  <td className={`date-cell ${urgClass(firm.closes)}`}>
                    {formatDate(firm.closes)}
                    {daysUntil(firm.closes)>0&&daysUntil(firm.closes)<=30&&<span style={{marginLeft:5,fontSize:10}}>({daysUntil(firm.closes)}d)</span>}
                    {daysUntil(firm.closes)<0&&<span style={{marginLeft:4,color:'var(--muted)',fontSize:10}}>Closed</span>}
                  </td>
                  <td style={{fontSize:11,color:'var(--muted)',whiteSpace:'nowrap'}}>{firm.pay}</td>
                  <td className="no-strike">
                    <select className={`stage-select ${so.c}`} value={st.stage} onChange={e=>update(firm.id,'stage',e.target.value)}>
                      {STAGES.map(s => <option key={s.v} value={s.v}>{s.l}</option>)}
                    </select>
                  </td>
                  <td className="no-strike">
                    <input className="notes-input" placeholder="Quick note…" value={st.notes||''} onChange={e=>update(firm.id,'notes',e.target.value)} />
                  </td>
                  <td className="no-strike">
                    <button className={`icon-btn ${fc>0?'has-files':''}`} title={`${fc} file(s) · Click to manage`} onClick={()=>setModal(firm)}>
                      📎{fc>0&&<span style={{fontSize:9,marginLeft:2,verticalAlign:'super'}}>{fc}</span>}
                    </button>
                  </td>
                  <td className="no-strike">
                    <button className={`icon-btn ${st.completed?'done':''}`} onClick={()=>update(firm.id,'completed',!st.completed)} title={st.completed?'Mark incomplete':'Mark complete'}>
                      {st.completed ? '✓' : '○'}
                    </button>
                  </td>
                </tr>
              );
            })}
            {filtered.length===0&&<tr><td colSpan={10}><div className="empty-state"><div className="empty-icon">🔍</div>No firms match.</div></td></tr>}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   CALENDAR VIEW
═══════════════════════════════════════════════ */
function CalendarView({ appState }) {
  const today = new Date();
  const [year, setYear]   = useState(today.getFullYear());
  const [month, setMonth] = useState(today.getMonth());
  function prevM(){if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);}
  function nextM(){if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);}
  const firstDay = new Date(year,month,1).getDay();
  const daysInM  = new Date(year,month+1,0).getDate();
  const prevDays = new Date(year,month,0).getDate();
  const cells = [];
  for(let i=firstDay-1;i>=0;i--) cells.push({day:prevDays-i,cur:false});
  for(let d=1;d<=daysInM;d++) cells.push({day:d,cur:true,date:new Date(year,month,d)});
  let nd=1; while(cells.length%7!==0) cells.push({day:nd++,cur:false});
  const ds = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const todayS = ds(today);
  function eventsOn(d){const s=ds(d);const ev=[];FIRMS.forEach(f=>{const done=appState[f.id]?.completed;if(f.opens===s)ev.push({f,type:'opens',done});if(f.closes===s)ev.push({f,type:'closes',done});});return ev;}
  return (
    <div>
      <div className="section-header" style={{marginBottom:14}}>
        <div className="section-title">Deadline Calendar</div>
        <div style={{display:'flex',gap:10,fontFamily:'sans-serif',fontSize:11,alignItems:'center',color:'var(--muted)'}}>
          <span style={{display:'flex',alignItems:'center',gap:4}}><span style={{width:8,height:8,background:'var(--blue)',borderRadius:2,display:'inline-block'}}/>Opens</span>
          <span style={{display:'flex',alignItems:'center',gap:4}}><span style={{width:8,height:8,background:'var(--red)',borderRadius:2,display:'inline-block'}}/>Deadline</span>
        </div>
      </div>
      <div className="calendar-wrapper">
        <div className="calendar-header">
          <button className="cal-nav-btn" onClick={prevM}>‹</button>
          <span className="cal-month-title">{MONTHS[month]} {year}</span>
          <button className="cal-nav-btn" onClick={nextM}>›</button>
        </div>
        <div className="cal-grid">
          {DAYS.map(d => <div key={d} className="cal-dow">{d}</div>)}
          {cells.map((c,i) => {
            const evs = c.cur ? eventsOn(c.date) : [];
            const isToday = c.cur && ds(c.date) === todayS;
            return (
              <div key={i} className={`cal-cell ${!c.cur?'other-month':''} ${isToday?'today':''}`}>
                <div className="cal-day-num">{c.day}</div>
                {evs.slice(0,3).map((ev,j) => (
                  <div key={j} className={`cal-event ${ev.type} ${ev.done?'done-event':''}`} title={`${ev.f.name} — ${ev.type==='opens'?'Opens':'Deadline'}`}>
                    {ev.type==='opens'?'▶ ':'⏰ '}{ev.f.name}
                  </div>
                ))}
                {evs.length>3&&<div style={{fontSize:9,color:'var(--muted)',fontFamily:'sans-serif'}}>+{evs.length-3} more</div>}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   TIMELINE VIEW
═══════════════════════════════════════════════ */
function TimelineView({ appState }) {
  const today = new Date(); today.setHours(0,0,0,0);
  const events = [];
  FIRMS.forEach(f => {
    events.push({date:f.opens,firm:f,type:'opens',label:`${f.name} — Applications Open`,detail:`${f.prog} · ${f.loc} · ${f.pay}`});
    events.push({date:f.closes,firm:f,type:'closes',label:`${f.name} — Deadline`,detail:`${f.prog} · ${f.loc} · ${f.pay}`});
  });
  events.sort((a,b) => a.date < b.date ? -1 : a.date > b.date ? 1 : 0);
  const upcoming = events.filter(e => { const d=parseDate(e.date); d.setHours(0,0,0,0); return d >= today; }).slice(0,80);
  let lastDate = null;
  return (
    <div>
      <div className="section-header" style={{marginBottom:14}}>
        <div className="section-title">Upcoming Timeline</div>
        <span style={{fontFamily:'sans-serif',fontSize:12,color:'var(--muted)'}}>{upcoming.length} upcoming events</span>
      </div>
      <div className="timeline-container">
        {upcoming.map((ev,i) => {
          const isNew = ev.date !== lastDate; lastDate = ev.date;
          const done  = appState[ev.firm.id]?.completed;
          const du    = daysUntil(ev.date);
          return (
            <div key={i} className="timeline-item">
              <div className="timeline-left">
                <div className={`timeline-dot ${ev.type==='closes'?'closes':''}`}/>
                {i<upcoming.length-1&&<div className="timeline-line"/>}
              </div>
              <div className="timeline-content">
                {isNew&&<div className="timeline-date">{formatDate(ev.date)}{du>=0&&` · in ${du} day${du!==1?'s':''}`}</div>}
                <div className={`timeline-card ${ev.type==='closes'?'closes':''}`} style={{opacity:done?0.4:1,textDecoration:done?'line-through':'none'}}>
                  <div className="timeline-firm">{ev.label}</div>
                  <div className="timeline-detail">{ev.detail}</div>
                </div>
              </div>
            </div>
          );
        })}
        {upcoming.length===0&&<div className="empty-state"><div className="empty-icon">🎉</div>All deadlines passed!</div>}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════════ */
function MainApp({ user }) {
  const [tab, setTab]           = useState('tracker');
  const [appState, setAppState] = useState(null);
  const [dark, setDark]         = useState(getDark);
  const [showSettings, setShowSettings] = useState(false);
  const userName = user.user_metadata?.name || user.email.split('@')[0];

  useEffect(() => {
    document.body.classList.toggle('dark', getDark());
    loadStates(user.id).then(setAppState).catch(console.error);
  }, [user.id]);

  function toggleDark(v) {
    document.body.classList.toggle('dark', v);
    setDark(v);
    localStorage.setItem('lt_dark', v ? '1' : '0');
  }

  if (!appState) return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'calc(100vh - 62px)',fontFamily:'sans-serif',color:'var(--muted)'}}>
      Loading your data…
    </div>
  );

  const soonCount = FIRMS.filter(f => { const d = daysUntil(f.closes); return d >= 0 && d <= 14; }).length;

  return (
    <>
      {showSettings && <SettingsModal user={user} dark={dark} onDark={toggleDark} onClose={()=>setShowSettings(false)} />}
      <div className="header">
        <div className="header-brand">
          <div className="header-logo">⚖</div>
          <div>
            <div className="header-title"><span>Law</span> Internship Tracker</div>
            <div className="header-subtitle">Summer 2027 · First Year Guide</div>
          </div>
        </div>
        <div style={{display:'flex',gap:5}}>
          {[['tracker','Tracker'],['calendar','Calendar'],['timeline','Timeline']].map(([t,l]) => (
            <button key={t} className={`hbtn ${tab===t?'active':''}`} onClick={()=>setTab(t)}>
              {l}{t==='calendar'&&soonCount>0&&<span className="badge">{soonCount}</span>}
            </button>
          ))}
        </div>
        <div className="header-right">
          <span className="header-user">Hi, {userName.split(' ')[0]}</span>
          <button className="hbtn icon" title="Settings" onClick={()=>setShowSettings(true)}>⚙</button>
        </div>
      </div>
      <div className="main">
        <StatBar appState={appState} />
        {tab==='tracker'  && <TrackerView appState={appState} setAppState={setAppState} userId={user.id} />}
        {tab==='calendar' && <CalendarView appState={appState} />}
        {tab==='timeline' && <TimelineView appState={appState} />}
      </div>
    </>
  );
}

/* ═══════════════════════════════════════════════
   ROOT
═══════════════════════════════════════════════ */
function App() {
  const [session, setSession] = useState(undefined); // undefined = checking

  useEffect(() => {
    document.body.classList.toggle('dark', getDark());
    sb.auth.getSession().then(({ data: { session } }) => setSession(session));
    const { data: { subscription } } = sb.auth.onAuthStateChange((_event, session) => setSession(session));
    return () => subscription.unsubscribe();
  }, []);

  if (session === undefined) return (
    <div className="loading-screen">
      <div className="loading-text">Loading…</div>
    </div>
  );

  if (!session) return <AuthPage />;
  return <MainApp user={session.user} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
