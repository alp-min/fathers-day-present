<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Law Internship Tracker 2027</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0f1f3d;
      --navy-mid: #1a3260;
      --navy-light: #243d75;
      --gold: #c9a84c;
      --gold-light: #e8c96e;
      --cream: #faf8f3;
      --cream-dark: #f0ece0;
      --text: #1a1a2e;
      --text-muted: #5a5a7a;
      --white: #ffffff;
      --green: #2d7a4f;
      --green-light: #e8f5ee;
      --red: #c0392b;
      --red-light: #fdecea;
      --orange: #d68a1a;
      --orange-light: #fff3e0;
      --blue: #1a6fa8;
      --blue-light: #e3f0fa;
      --purple: #6b3fa0;
      --purple-light: #f3eeff;
      --shadow: 0 2px 12px rgba(15,31,61,0.10);
      --shadow-lg: 0 8px 32px rgba(15,31,61,0.15);
    }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: var(--navy);
      color: var(--white);
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      box-shadow: var(--shadow-lg);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-logo {
      width: 36px;
      height: 36px;
      background: var(--gold);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .header-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.3px;
      color: var(--white);
    }
    .header-subtitle {
      font-size: 11px;
      color: var(--gold-light);
      font-family: sans-serif;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .header-nav {
      display: flex;
      gap: 4px;
    }
    .nav-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.7);
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-family: sans-serif;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s;
      letter-spacing: 0.3px;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.1); color: var(--white); }
    .nav-btn.active { background: var(--gold); color: var(--navy); font-weight: 700; }

    /* ── Layout ── */
    .main { max-width: 1280px; margin: 0 auto; padding: 28px 24px; }

    /* ── Stats Bar ── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--white);
      border-radius: 12px;
      padding: 16px;
      box-shadow: var(--shadow);
      border-top: 3px solid var(--gold);
      text-align: center;
    }
    .stat-card.green { border-top-color: var(--green); }
    .stat-card.blue { border-top-color: var(--blue); }
    .stat-card.orange { border-top-color: var(--orange); }
    .stat-card.purple { border-top-color: var(--purple); }
    .stat-card.red { border-top-color: var(--red); }
    .stat-num {
      font-size: 28px;
      font-weight: 700;
      color: var(--navy);
      line-height: 1;
      margin-bottom: 4px;
    }
    .stat-label {
      font-family: sans-serif;
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    /* ── Progress Bar ── */
    .progress-section {
      background: var(--white);
      border-radius: 12px;
      padding: 16px 20px;
      box-shadow: var(--shadow);
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .progress-label {
      font-family: sans-serif;
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      min-width: 140px;
    }
    .progress-track {
      flex: 1;
      height: 10px;
      background: var(--cream-dark);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold) 0%, var(--green) 100%);
      border-radius: 99px;
      transition: width 0.4s ease;
    }
    .progress-pct {
      font-family: sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--navy);
      min-width: 40px;
      text-align: right;
    }

    /* ── Firm Tracker Table ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .section-title {
      font-size: 20px;
      color: var(--navy);
      font-weight: 700;
    }
    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .filter-chip {
      background: none;
      border: 1.5px solid var(--cream-dark);
      padding: 6px 14px;
      border-radius: 99px;
      font-family: sans-serif;
      font-size: 12px;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.15s;
    }
    .filter-chip:hover { border-color: var(--gold); color: var(--navy); }
    .filter-chip.active { background: var(--navy); border-color: var(--navy); color: var(--white); }

    .tracker-table {
      background: var(--white);
      border-radius: 14px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .tracker-table table {
      width: 100%;
      border-collapse: collapse;
    }
    .tracker-table thead {
      background: var(--navy);
      color: var(--white);
    }
    .tracker-table th {
      padding: 12px 16px;
      text-align: left;
      font-family: sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .tracker-table td {
      padding: 11px 16px;
      border-bottom: 1px solid var(--cream-dark);
      font-family: sans-serif;
      font-size: 13px;
      vertical-align: middle;
    }
    .tracker-table tr:last-child td { border-bottom: none; }
    .tracker-table tbody tr:hover { background: var(--cream); }
    .tracker-table tbody tr.completed { opacity: 0.5; }
    .tracker-table tbody tr.completed td { text-decoration: line-through; }
    .tracker-table tbody tr.completed td.no-strike { text-decoration: none; }

    .firm-name { font-weight: 600; color: var(--navy); font-size: 13px; }
    .firm-type {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .firm-type.magic { background: #fff0cc; color: #8a6000; }
    .firm-type.silver { background: #e8eaf6; color: #3949ab; }
    .firm-type.us { background: #fce4ec; color: #c62828; }
    .firm-type.other { background: #e8f5e9; color: #2e7d32; }

    .date-cell { color: var(--text-muted); white-space: nowrap; }
    .date-cell.urgent { color: var(--red); font-weight: 600; }
    .date-cell.soon { color: var(--orange); font-weight: 600; }

    .stage-select {
      border: 1.5px solid var(--cream-dark);
      border-radius: 6px;
      padding: 5px 10px;
      font-family: sans-serif;
      font-size: 12px;
      cursor: pointer;
      background: var(--cream);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      min-width: 155px;
    }
    .stage-select:focus { border-color: var(--gold); }
    .stage-select.stage-not-started { background: var(--cream); }
    .stage-select.stage-researching { background: #e3f0fa; color: var(--blue); }
    .stage-select.stage-applied { background: #fff3e0; color: var(--orange); }
    .stage-select.stage-online-test { background: #f3eeff; color: var(--purple); }
    .stage-select.stage-first-interview { background: #e3f0fa; color: #0d47a1; }
    .stage-select.stage-second-interview { background: #e8f5ee; color: var(--green); }
    .stage-select.stage-ac { background: #fce4ec; color: #880e4f; }
    .stage-select.stage-offer { background: #e8f5ee; color: var(--green); font-weight: 700; }
    .stage-select.stage-rejected { background: var(--red-light); color: var(--red); }
    .stage-select.stage-withdrawn { background: var(--cream-dark); color: var(--text-muted); }

    .complete-btn {
      background: none;
      border: 1.5px solid var(--cream-dark);
      border-radius: 6px;
      padding: 5px 10px;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.15s;
      color: var(--text-muted);
    }
    .complete-btn:hover { border-color: var(--green); background: var(--green-light); }
    .complete-btn.done { border-color: var(--green); background: var(--green-light); color: var(--green); }

    .notes-input {
      border: 1.5px solid var(--cream-dark);
      border-radius: 6px;
      padding: 5px 8px;
      font-family: sans-serif;
      font-size: 12px;
      background: var(--cream);
      color: var(--text);
      outline: none;
      width: 140px;
      transition: border-color 0.15s;
    }
    .notes-input:focus { border-color: var(--gold); }

    /* ── Calendar ── */
    .calendar-wrapper {
      background: var(--white);
      border-radius: 14px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .calendar-header {
      background: var(--navy);
      color: var(--white);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .cal-nav-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      width: 32px;
      height: 32px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .cal-nav-btn:hover { background: rgba(255,255,255,0.25); }
    .cal-month-title { font-size: 18px; font-weight: 700; }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }
    .cal-dow {
      padding: 10px 4px;
      text-align: center;
      font-family: sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      border-bottom: 2px solid var(--cream-dark);
    }
    .cal-cell {
      min-height: 90px;
      padding: 6px;
      border-right: 1px solid var(--cream-dark);
      border-bottom: 1px solid var(--cream-dark);
      position: relative;
    }
    .cal-cell:nth-child(7n) { border-right: none; }
    .cal-cell.other-month { background: var(--cream); }
    .cal-cell.today { background: #fffbe6; }
    .cal-day-num {
      font-family: sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .cal-cell.today .cal-day-num {
      background: var(--gold);
      color: var(--navy);
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cal-event {
      font-family: sans-serif;
      font-size: 10px;
      padding: 2px 5px;
      border-radius: 4px;
      margin-bottom: 2px;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: opacity 0.15s;
    }
    .cal-event:hover { opacity: 0.8; }
    .cal-event.opens { background: #e3f0fa; color: #0d47a1; border-left: 3px solid #0d47a1; }
    .cal-event.closes { background: #fce4ec; color: #c62828; border-left: 3px solid #c62828; }
    .cal-event.done-event { opacity: 0.4; text-decoration: line-through; }

    /* ── Timeline ── */
    .timeline-container {
      background: var(--white);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 24px;
    }
    .timeline-item {
      display: flex;
      gap: 16px;
      margin-bottom: 0;
    }
    .timeline-left {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 40px;
    }
    .timeline-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--gold);
      border: 3px solid var(--white);
      box-shadow: 0 0 0 2px var(--gold);
      flex-shrink: 0;
      z-index: 1;
    }
    .timeline-dot.closes { background: var(--red); box-shadow: 0 0 0 2px var(--red); }
    .timeline-dot.past { background: var(--text-muted); box-shadow: 0 0 0 2px var(--text-muted); }
    .timeline-line {
      width: 2px;
      flex: 1;
      background: var(--cream-dark);
      margin: 4px 0;
    }
    .timeline-content {
      padding-bottom: 20px;
      flex: 1;
    }
    .timeline-date {
      font-family: sans-serif;
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .timeline-card {
      background: var(--cream);
      border-radius: 8px;
      padding: 10px 14px;
      border-left: 3px solid var(--gold);
    }
    .timeline-card.closes { border-left-color: var(--red); }
    .timeline-firm { font-weight: 700; font-size: 13px; color: var(--navy); }
    .timeline-detail { font-family: sans-serif; font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* ── Tooltip / Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15,31,61,0.5);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal {
      background: var(--white);
      border-radius: 14px;
      padding: 28px;
      max-width: 480px;
      width: 90%;
      box-shadow: var(--shadow-lg);
    }
    .modal-title { font-size: 20px; font-weight: 700; color: var(--navy); margin-bottom: 16px; }
    .modal-close {
      float: right;
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: var(--text-muted);
      margin-top: -4px;
    }
    .modal-row { display: flex; gap: 8px; align-items: baseline; margin-bottom: 8px; }
    .modal-key { font-family: sans-serif; font-size: 12px; color: var(--text-muted); min-width: 100px; }
    .modal-val { font-family: sans-serif; font-size: 13px; color: var(--text); font-weight: 500; }

    /* ── Misc ── */
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--red);
      color: white;
      font-family: sans-serif;
      font-size: 10px;
      font-weight: 700;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      margin-left: 6px;
    }
    .empty-state {
      text-align: center;
      padding: 48px;
      color: var(--text-muted);
      font-family: sans-serif;
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .search-input {
      border: 1.5px solid var(--cream-dark);
      border-radius: 8px;
      padding: 8px 14px;
      font-family: sans-serif;
      font-size: 13px;
      outline: none;
      background: var(--white);
      color: var(--text);
      transition: border-color 0.15s;
      width: 220px;
    }
    .search-input:focus { border-color: var(--gold); }

    @media (max-width: 900px) {
      .stats-bar { grid-template-columns: repeat(3, 1fr); }
      .header-nav { display: none; }
    }
    @media (max-width: 600px) {
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
      .main { padding: 16px; }
    }
  </style>
</head>

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const SHORT_MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

/* ─────────────────────────────────────────────
   HELPERS
───────────────────────────────────────────── */
function parseDate(s) { return new Date(s + 'T00:00:00'); }

function formatDate(s) {
  const d = parseDate(s);
  return `${d.getDate()} ${SHORT_MONTHS[d.getMonth()]} ${d.getFullYear()}`;
}

function getDaysUntil(s) {
  const today = new Date(); today.setHours(0,0,0,0);
  const d = parseDate(s); d.setHours(0,0,0,0);
  return Math.round((d - today) / 86400000);
}

function urgencyClass(s) {
  const days = getDaysUntil(s);
  if (days < 0) return '';
  if (days <= 14) return 'urgent';
  if (days <= 30) return 'soon';
  return '';
}

function stageClass(stage) {
  return STAGES.find(s => s.value === stage)?.cls || 'stage-not-started';
}

function stageLabel(stage) {
  return STAGES.find(s => s.value === stage)?.label || 'Not Started';
}

/* ─────────────────────────────────────────────
   STORAGE
───────────────────────────────────────────── */
const STORAGE_KEY = 'law_tracker_v2';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  const state = {};
  FIRMS.forEach(f => {
    state[f.id] = { stage: 'not-started', completed: false, notes: '' };
  });
  return state;
}

function saveState(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

───────────────────────────────────────────── */
function StatBar({ appState }) {
  const total = FIRMS.length;
  const applied = Object.values(appState).filter(s =>
    ['applied','online-test','first-interview','second-interview','ac','offer'].includes(s.stage)
  ).length;
  const interviews = Object.values(appState).filter(s =>
    ['first-interview','second-interview','ac'].includes(s.stage)
  ).length;
  const acs = Object.values(appState).filter(s => s.stage === 'ac').length;
  const offers = Object.values(appState).filter(s => s.stage === 'offer').length;
  const rejected = Object.values(appState).filter(s => s.stage === 'rejected').length;
  const pct = total > 0 ? Math.round((applied / total) * 100) : 0;

function TrackerView({ appState, setAppState }) {
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');
  const [modal, setModal] = useState(null);
  const [sortCol, setSortCol] = useState('closes');
  const [sortDir, setSortDir] = useState(1);

  const typeFilters = [
    { key: 'all', label: 'All Firms' },
    { key: 'first-year', label: '1st Year Only' },
    { key: 'magic', label: 'Magic Circle' },
    { key: 'silver', label: 'Silver Circle' },
    { key: 'us', label: 'US Firms' },
    { key: 'other', label: 'Other' },
  ];

  const filtered = useMemo(() => {
    let list = [...FIRMS];
    if (filter === 'first-year') list = list.filter(f => f.firstYear);
    else if (filter !== 'all') list = list.filter(f => f.type === filter);
    if (search.trim()) {
      const q = search.toLowerCase();
      list = list.filter(f => f.name.toLowerCase().includes(q) || f.program.toLowerCase().includes(q));
    }
    list.sort((a,b) => {
      let va, vb;
      if (sortCol === 'closes') { va = a.closes; vb = b.closes; }
      else if (sortCol === 'opens') { va = a.opens; vb = b.opens; }
      else if (sortCol === 'name') { va = a.name; vb = b.name; }
      else if (sortCol === 'stage') { va = stageLabel(appState[a.id]?.stage || 'not-started'); vb = stageLabel(appState[b.id]?.stage || 'not-started'); }
      else { va = a[sortCol] || ''; vb = b[sortCol] || ''; }
      return va < vb ? -sortDir : va > vb ? sortDir : 0;
    });
    return list;
  }, [filter, search, appState, sortCol, sortDir]);

  function updateField(id, field, val) {
    setAppState(prev => {
      const next = { ...prev, [id]: { ...prev[id], [field]: val } };
      saveState(next);
      return next;
    });
  }

  function thBtn(col, label) {
    return (
      <th onClick={() => { if(sortCol===col) setSortDir(d=>-d); else { setSortCol(col); setSortDir(1); }}} style={{cursor:'pointer', userSelect:'none'}}>
        {label} {sortCol===col ? (sortDir===1?'↑':'↓') : ''}
      </th>
    );
  }

  return (
    <div>
      {modal && (
        <div className="modal-overlay" onClick={() => setModal(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <button className="modal-close" onClick={() => setModal(null)}>×</button>
            <div className="modal-title">{modal.name}</div>
            <div className="modal-row"><span className="modal-key">Programme</span><span className="modal-val">{modal.program}</span></div>
            <div className="modal-row"><span className="modal-key">Type</span><span className="modal-val">{modal.typeLabel}</span></div>
            <div className="modal-row"><span className="modal-key">Opens</span><span className="modal-val">{formatDate(modal.opens)}</span></div>
            <div className="modal-row"><span className="modal-key">Closes</span><span className="modal-val">{formatDate(modal.closes)}</span></div>
            <div className="modal-row"><span className="modal-key">Duration</span><span className="modal-val">{modal.duration}</span></div>
            <div className="modal-row"><span className="modal-key">Stipend</span><span className="modal-val">{modal.stipend}</span></div>
            <div className="modal-row"><span className="modal-key">Location</span><span className="modal-val">{modal.location}</span></div>
            <div style={{ marginTop: 12, fontFamily: 'sans-serif', fontSize: 13, color: 'var(--text-muted)', lineHeight: 1.6 }}>{modal.description}</div>
            {modal.firstYear && <div style={{ marginTop: 10, background: 'var(--green-light)', color: 'var(--green)', padding: '6px 12px', borderRadius: 6, fontFamily: 'sans-serif', fontSize: 12, fontWeight: 700 }}>✓ Open to First-Year Students</div>}
            <div style={{ marginTop: 16 }}>
              <a href={modal.url} target="_blank" rel="noopener" style={{ color: 'var(--blue)', fontFamily: 'sans-serif', fontSize: 13 }}>Visit application page →</a>
            </div>
          </div>
        </div>
      )}

      <div className="section-header">

          Application Tracker

            {filtered.length} firms

            placeholder="Search firms…"

                <tr key={firm.id} className={st.completed ? 'completed' : ''}>
                  <td>
                    <span className="firm-name" style={{ cursor: 'pointer', textDecoration: 'underline dotted' }} onClick={() => setModal(firm)}>
                      {firm.name}
                    </span>
                    {firm.firstYear && <span style={{ marginLeft: 6, fontSize: 10, background: 'var(--green-light)', color: 'var(--green)', padding: '1px 5px', borderRadius: 3, fontFamily: 'sans-serif', fontWeight: 700 }}>1Y</span>}
                  </td>
                  <td><span className={`firm-type ${firm.type}`}>{firm.typeLabel}</span></td>
                  <td style={{ maxWidth: 160, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', fontSize: 12 }}>{firm.program}</td>
                  <td className={`date-cell ${urgencyClass(firm.opens)}`}>{formatDate(firm.opens)}</td>
                  <td className={`date-cell ${urgencyClass(firm.closes)}`}>
                    {formatDate(firm.closes)}
                    {getDaysUntil(firm.closes) > 0 && getDaysUntil(firm.closes) <= 30 && (
                      <span style={{ marginLeft: 6, fontFamily: 'sans-serif', fontSize: 10 }}>({getDaysUntil(firm.closes)}d)</span>
                    )}
                    {getDaysUntil(firm.closes) < 0 && <span style={{ marginLeft: 4, color: 'var(--text-muted)', fontSize: 10 }}>Closed</span>}
                  </td>
                  <td style={{ fontSize: 12, color: 'var(--text-muted)' }}>{firm.stipend}</td>
                  <td className="no-strike">
                    <select
                      className={`stage-select ${stageClass(st.stage)}`}
                      value={st.stage}
                      onChange={e => updateField(firm.id, 'stage', e.target.value)}
                    >
                      {STAGES.map(s => <option key={s.value} value={s.value}>{s.label}</option>)}
                    </select>
                  </td>
                  <td className="no-strike">
                    <input
                      className="notes-input"
                      placeholder="Add note…"
                      value={st.notes}
                      onChange={e => updateField(firm.id, 'notes', e.target.value)}
                    />
                  </td>
                  <td className="no-strike">
                    <button
                      className={`complete-btn ${st.completed ? 'done' : ''}`}
                      title={st.completed ? 'Mark incomplete' : 'Mark complete'}
                      onClick={() => updateField(firm.id, 'completed', !st.completed)}
                    >
                      {st.completed ? '✓' : '○'}
                    </button>
                  </td>
                </tr>
              );
            })}
            {filtered.length === 0 && (
              <tr><td colSpan={9}>
                <div className="empty-state"><div className="icon">🔍</div>No firms match your search.</div>
              </td></tr>
            )}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function CalendarView({ appState }) {
  const today = new Date();
  const [year, setYear] = useState(today.getFullYear());
  const [month, setMonth] = useState(today.getMonth());

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const daysInPrev = new Date(year, month, 0).getDate();

  const cells = [];
  // prev month padding
  for (let i = firstDay - 1; i >= 0; i--) {
    cells.push({ day: daysInPrev - i, thisMonth: false, date: new Date(year, month - 1, daysInPrev - i) });
  }
  // this month
  for (let d = 1; d <= daysInMonth; d++) {
    cells.push({ day: d, thisMonth: true, date: new Date(year, month, d) });
  }
  // next month padding
  let nd = 1;
  while (cells.length % 7 !== 0) {
    cells.push({ day: nd++, thisMonth: false, date: new Date(year, month + 1, nd - 1) });
  }

  function dateStr(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function eventsOn(d) {
    const ds = dateStr(d);
    const evs = [];
    FIRMS.forEach(f => {
      const done = appState[f.id]?.completed;
      if (f.opens === ds) evs.push({ firm: f, type: 'opens', done });
      if (f.closes === ds) evs.push({ firm: f, type: 'closes', done });
    });
    return evs;
  }

  function prevMonth() { if(month===0){setMonth(11);setYear(y=>y-1);}else{setMonth(m=>m-1);} }
  function nextMonth() { if(month===11){setMonth(0);setYear(y=>y+1);}else{setMonth(m=>m+1);} }

  const todayStr = dateStr(today);

  return (
    <div>
      <div className="section-header" style={{ marginBottom: 16 }}>
        <div className="section-title">Deadline Calendar</div>
        <div style={{ display: 'flex', gap: 10, fontFamily: 'sans-serif', fontSize: 12, alignItems: 'center' }}>
          <span style={{ display: 'flex', alignItems: 'center', gap: 4 }}><span style={{ width: 10, height: 10, background: '#0d47a1', borderRadius: 2, display: 'inline-block' }} /> Opens</span>
          <span style={{ display: 'flex', alignItems: 'center', gap: 4 }}><span style={{ width: 10, height: 10, background: '#c62828', borderRadius: 2, display: 'inline-block' }} /> Deadline</span>
          <span style={{ color: 'var(--text-muted)' }}>Strikethrough = completed</span>
        </div>
      </div>
      <div className="calendar-wrapper">
        <div className="calendar-header">
          <button className="cal-nav-btn" onClick={prevMonth}>‹</button>
          <span className="cal-month-title">{MONTHS[month]} {year}</span>
          <button className="cal-nav-btn" onClick={nextMonth}>›</button>
        </div>
        <div className="cal-grid">
          {DAYS.map(d => <div key={d} className="cal-dow">{d}</div>)}
          {cells.map((c, i) => {
            const evs = c.thisMonth ? eventsOn(c.date) : [];
            const isToday = c.thisMonth && dateStr(c.date) === todayStr;
            return (
              <div key={i} className={`cal-cell ${!c.thisMonth ? 'other-month' : ''} ${isToday ? 'today' : ''}`}>
                <div className="cal-day-num">{c.day}</div>
                {evs.slice(0,3).map((ev, j) => (
                  <div key={j} className={`cal-event ${ev.type} ${ev.done ? 'done-event' : ''}`} title={`${ev.firm.name} — ${ev.type === 'opens' ? 'Opens' : 'Deadline'}`}>
                    {ev.type === 'opens' ? '▶ ' : '⏰ '}{ev.firm.name}
                  </div>
                ))}
                {evs.length > 3 && <div style={{ fontSize: 10, color: 'var(--text-muted)', fontFamily: 'sans-serif' }}>+{evs.length - 3} more</div>}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function TimelineView({ appState }) {
  const events = [];
  FIRMS.forEach(f => {
    events.push({ date: f.opens, firm: f, type: 'opens', label: `${f.name} — Applications Open`, detail: f.program });
    events.push({ date: f.closes, firm: f, type: 'closes', label: `${f.name} — Deadline`, detail: f.program });
  });
  events.sort((a,b) => a.date < b.date ? -1 : a.date > b.date ? 1 : 0);

  const today = new Date(); today.setHours(0,0,0,0);
  const upcoming = events.filter(e => {
    const d = parseDate(e.date); d.setHours(0,0,0,0);
    return d >= today;
  }).slice(0, 60);

  let lastDate = null;

  return (
    <div>
      <div className="section-header" style={{ marginBottom: 16 }}>
        <div className="section-title">Upcoming Timeline</div>
        <span style={{ fontFamily: 'sans-serif', fontSize: 12, color: 'var(--text-muted)' }}>
          Next {upcoming.length} events
        </span>
      </div>
      <div className="timeline-container">
        {upcoming.map((ev, i) => {
          const isNewDate = ev.date !== lastDate;
          lastDate = ev.date;
          const done = appState[ev.firm.id]?.completed;
          const isPast = parseDate(ev.date) < today;
          return (
            <div key={i} className="timeline-item">
              <div className="timeline-left">
                <div className={`timeline-dot ${ev.type === 'closes' ? 'closes' : ''} ${isPast ? 'past' : ''}`} />
                {i < upcoming.length - 1 && <div className="timeline-line" />}
              </div>
              <div className="timeline-content">
                {isNewDate && <div className="timeline-date">{formatDate(ev.date)}{getDaysUntil(ev.date) >= 0 && ` · in ${getDaysUntil(ev.date)} days`}</div>}
                <div className={`timeline-card ${ev.type === 'closes' ? 'closes' : ''}`} style={{ opacity: done ? 0.45 : 1, textDecoration: done ? 'line-through' : 'none' }}>
                  <div className="timeline-firm">{ev.label}</div>
                  <div className="timeline-detail">{ev.detail} · {ev.firm.location} · {ev.firm.stipend}</div>
                </div>
              </div>
            </div>
          );
        })}
        {upcoming.length === 0 && <div className="empty-state"><div className="icon">🎉</div>All deadlines have passed.</div>}
      </div>
    </div>
  );
}

/* ─────────────────────────────────────────────
   APP ROOT
───────────────────────────────────────────── */
function App() {
  const [tab, setTab] = useState('tracker');
  const [appState, setAppState] = useState(loadState);

  const deadlinesSoon = FIRMS.filter(f => {
    const days = getDaysUntil(f.closes);
    return days >= 0 && days <= 14;
  }).length;

  return (
    <>
      <div className="header">
        <div className="header-brand">
          <div className="header-logo">⚖</div>
          <div>
            <div className="header-title">Law Internship Tracker</div>
            <div className="header-subtitle">Summer 2027 · First Year Guide</div>
          </div>
        </div>
        <nav className="header-nav">
          <button className={`nav-btn ${tab==='tracker'?'active':''}`} onClick={()=>setTab('tracker')}>Tracker</button>
          <button className={`nav-btn ${tab==='calendar'?'active':''}`} onClick={()=>setTab('calendar')}>
            Calendar
            {deadlinesSoon > 0 && <span className="badge">{deadlinesSoon}</span>}
          </button>
          <button className={`nav-btn ${tab==='timeline'?'active':''}`} onClick={()=>setTab('timeline')}>Timeline</button>
        </nav>
        <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
          <div style={{ fontFamily: 'sans-serif', fontSize: 11, color: 'rgba(255,255,255,0.5)', textAlign: 'right' }}>
            {new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })}
          </div>
          <div style={{ display: 'flex', gap: 4 }}>
            {['tracker','calendar','timeline'].map(t => (
              <button key={t} className={`nav-btn ${tab===t?'active':''}`} onClick={()=>setTab(t)} style={{ fontSize: 12, padding: '6px 12px' }}>
                {t==='tracker'?'Tracker':t==='calendar'?'Calendar':'Timeline'}
                {t==='calendar' && deadlinesSoon > 0 && <span className="badge">{deadlinesSoon}</span>}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div className="main">
        <StatBar appState={appState} />
        {tab === 'tracker' && <TrackerView appState={appState} setAppState={setAppState} />}
        {tab === 'calendar' && <CalendarView appState={appState} />}
        {tab === 'timeline' && <TimelineView appState={appState} />}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
